name: vyapari_os_mobile
description: Vyapari OS - India-first business operating system.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State + Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Auth (mock today; Firebase later)
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI helpers
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
