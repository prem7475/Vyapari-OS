version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: vyapari_postgres
    restart: always
    environment:
      POSTGRES_DB: vyapari
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vyapari_net

  redis:
    image: redis:7-alpine
    container_name: vyapari_redis
    restart: always
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - vyapari_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vyapari_server
    restart: always
    env_file:
      - ./server/.env.example
    ports:
      - '8080:8080'
    depends_on:
      - postgres
      - redis
    networks:
      - vyapari_net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: vyapari_web
    restart: always
    env_file:
      - ./apps/web/.env.example
    ports:
      - '3000:3000'
    depends_on:
      - server
    networks:
      - vyapari_net

  nginx:
    image: nginx:stable-alpine
    container_name: vyapari_nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - server
    networks:
      - vyapari_net

volumes:
  postgres_data:
  redis_data:

networks:
  vyapari_net:
    driver: bridge
